app = "jump-section-n8n"
primary_region = "nrt"  # 도쿄 (한국에서 가장 가까운 리전)

[build]
  image = "n8nio/n8n:latest"

[env]
  N8N_HOST        = "0.0.0.0"
  N8N_PORT        = "5678"
  N8N_PROTOCOL    = "https"
  NODE_ENV        = "production"
  GENERIC_TIMEZONE = "Asia/Seoul"
  TZ              = "Asia/Seoul"
  EXECUTIONS_PROCESS           = "main"
  N8N_LOG_LEVEL                = "info"
  N8N_BLOCK_ENV_ACCESS_IN_NODE = "false"
  NODE_FUNCTION_ALLOW_BUILTIN  = "https,url,buffer,crypto"
  N8N_RUNNERS_ALLOW_BUILTIN_MODULES = "https,url,buffer,crypto"

[[mounts]]
  source      = "n8n_data"
  destination = "/home/node/.n8n"

[http_service]
  internal_port        = 5678
  force_https          = true
  auto_stop_machines   = false   # 항상 켜두기
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpus   = 1
